        function excelParaData(num) {
            if (!num) return '';
            var n = parseInt(num);
            if (isNaN(n)) return num;
            var d = new Date((n - 25569) * 86400 * 1000);
            return d.toLocaleDateString('pt-BR');
        }
        
        function formatarMoeda(valor) {
            return 'R$ ' + valor.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        function getPeriodo(mesRef) {
            if (mesRef === 'todos') return null;
            var partes = mesRef.split('-');
            var ano = parseInt(partes[0]);
            var mes = parseInt(partes[1]);
            return { inicio: new Date(ano, mes - 2, 21), fim: new Date(ano, mes - 1, 20) };
        }
        
        function aplicarFiltros() {
            var mesRef = document.getElementById('mes-ref').value;
            var regFiltro = document.getElementById('filtro-regional').value;
            var lojaFiltro = document.getElementById('filtro-loja').value;
            var periodo = getPeriodo(mesRef);
            
            var dados = dadosBrutos;
            
            // Filtro de período
            if (periodo) {
                document.getElementById('periodo-info').textContent = periodo.inicio.toLocaleDateString('pt-BR') + ' a ' + periodo.fim.toLocaleDateString('pt-BR');
                dados = dados.filter(function(item) {
                    var dataExcel = parseInt(item['DataVale']);
                    if (isNaN(dataExcel)) return false;
                    var data = new Date((dataExcel - 25569) * 86400 * 1000);
                    return data >= periodo.inicio && data <= periodo.fim;
                });
            } else {
                document.getElementById('periodo-info').textContent = 'Todos os períodos';
            }
            
            // Filtro de regional
            if (regFiltro !== 'todos') {
                dados = dados.filter(function(item) { return item['Regional'] === regFiltro; });
            }
            
            // Filtro de loja
            if (lojaFiltro !== 'todos') {
                dados = dados.filter(function(item) { return item['Loja'] === lojaFiltro; });
            }
            
            carregarTabelas(dados);
        }
        
        function carregarTabelas(dados) {
            var totalQtd = dados.length;
            var totalValor = 0;
            var porRegional = {};
            var porLoja = {};
            var porMotivo = {};
            
            dados.forEach(function(item) {
                var regional = item['Regional'] || 'Sem regional';
                var loja = item['Loja'] || 'Sem loja';
                var motivo = item['Motivo'] || 'Sem motivo';
                var valor = parseFloat((item['ValorVale'] || '0').toString().replace(',', '.')) || 0;
                
                totalValor += valor;
                
                if (!porRegional[regional]) porRegional[regional] = { qtd: 0, total: 0 };
                porRegional[regional].qtd++;
                porRegional[regional].total += valor;
                
                if (!porLoja[loja]) porLoja[loja] = { qtd: 0, total: 0 };
                porLoja[loja].qtd++;
                porLoja[loja].total += valor;
                
                if (!porMotivo[motivo]) porMotivo[motivo] = { qtd: 0, total: 0 };
                porMotivo[motivo].qtd++;
                porMotivo[motivo].total += valor;
            });
            
            // Resumo por Regional
            var html = '<table><thead><tr><th>Regional</th><th>QTD</th><th>Valor Total</th></tr></thead><tbody>';
            Object.keys(porRegional).sort().forEach(function(r) {
                html += '<tr><td><strong>' + r + '</strong></td><td>' + porRegional[r].qtd + '</td><td class="valor">' + formatarMoeda(porRegional[r].total) + '</td></tr>';
            });
            html += '<tr style="font-weight:bold;background:#e6f0ff;"><td><strong>TOTAL</strong></td><td>' + totalQtd + '</td><td class="valor">' + formatarMoeda(totalValor) + '</td></tr></tbody></table>';
            document.getElementById('tabela-resumo').innerHTML = html;
            
            // Abono por Loja
            html = '<table><thead><tr><th>Loja</th><th>QTD</th><th>Valor Total</th></tr></thead><tbody>';
            Object.keys(porLoja).sort().forEach(function(l) {
                html += '<tr><td>' + l + '</td><td>' + porLoja[l].qtd + '</td><td class="valor">' + formatarMoeda(porLoja[l].total) + '</td></tr>';
            });
            html += '<tr style="font-weight:bold;background:#e6f0ff;"><td><strong>TOTAL</strong></td><td>' + totalQtd + '</td><td class="valor">' + formatarMoeda(totalValor) + '</td></tr></tbody></table>';
            document.getElementById('tabela-loja').innerHTML = html;
            
            // Principais Motivos (ordenado por valor total decrescente)
            var motivosArr = [];
            Object.keys(porMotivo).forEach(function(m) {
                motivosArr.push({ motivo: m, qtd: porMotivo[m].qtd, total: porMotivo[m].total });
            });
            motivosArr.sort(function(a, b) { return b.total - a.total; });
            
            html = '<table><thead><tr><th>Motivo</th><th>QTD</th><th>Valor Total</th></tr></thead><tbody>';
            motivosArr.forEach(function(m) {
                html += '<tr><td>' + m.motivo + '</td><td>' + m.qtd + '</td><td class="valor">' + formatarMoeda(m.total) + '</td></tr>';
            });
            html += '<tr style="font-weight:bold;background:#e6f0ff;"><td><strong>TOTAL</strong></td><td>' + totalQtd + '</td><td class="valor">' + formatarMoeda(totalValor) + '</td></tr></tbody></table>';
            document.getElementById('tabela-motivos').innerHTML = html;
            
            // Base Completa
            html = '<table><thead><tr><th>Regional</th><th>Loja</th><th>Data</th><th>Motivo</th><th>Valor</th></tr></thead><tbody>';
            dados.forEach(function(item) {
                html += '<tr><td>' + (item['Regional'] || '') + '</td><td>' + (item['Loja'] || '') + '</td><td>' + excelParaData(item['DataVale']) + '</td><td>' + (item['Motivo'] || '') + '</td><td class="valor">' + formatarMoeda(parseFloat((item['ValorVale'] || '0').toString().replace(',', '.')) || 0) + '</td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('tabela-base').innerHTML = html;
            
            // Cards
            document.getElementById('total-vales').textContent = totalQtd;
            document.getElementById('valor-total').textContent = formatarMoeda(totalValor);
            document.getElementById('total-regionais').textContent = Object.keys(porRegional).length;
            document.getElementById('total-lojas').textContent = Object.keys(porLoja).length;
        }
        
        function popularDropdowns() {
            var regionais = new Set();
            var lojas = new Set();
            dadosBrutos.forEach(function(item) {
                if (item['Regional']) regionais.add(item['Regional']);
                if (item['Loja']) lojas.add(item['Loja']);
            });
            
            var selReg = document.getElementById('filtro-regional');
            Array.from(regionais).sort().forEach(function(r) {
                var opt = document.createElement('option');
                opt.value = r; opt.textContent = r;
                selReg.appendChild(opt);
            });
            
            var selLoja = document.getElementById('filtro-loja');
            Array.from(lojas).sort().forEach(function(l) {
                var opt = document.createElement('option');
                opt.value = l; opt.textContent = l;
                selLoja.appendChild(opt);
            });
        }
        
        function abrirAba(nome) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('ativo'); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('ativo'); });
            event.target.classList.add('ativo');
            document.getElementById('aba-' + nome).classList.add('ativo');
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            popularDropdowns();
            aplicarFiltros();
        });
    </script>
</body>
</html>
