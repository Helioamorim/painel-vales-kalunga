        let dadosFiltrados = [];
        
        function excelParaData(num) {
            if (!num) return '';
            var n = parseInt(num);
            if (isNaN(n)) return num;
            var d = new Date((n - 25569) * 86400 * 1000);
            return d.toLocaleDateString('pt-BR');
        }
        
        function excelParaHora(num) {
    if (!num) return '';
    var n = parseFloat(num);
    if (isNaN(n)) return '';
    // Pega apenas a parte decimal (a hora)
    var parteDecimal = n - Math.floor(n);
    var totalMinutos = Math.round(parteDecimal * 24 * 60);
    var horas = Math.floor(totalMinutos / 60);
    var minutos = totalMinutos % 60;
    return String(horas).padStart(2,'0') + ':' + String(minutos).padStart(2,'0');
}
      function excelParaDataHora(dataNum, horaNum) {
    var data = excelParaData(dataNum);
    var hora = excelParaHora(horaNum);
    if (data && hora) return data + ' ' + hora;
    if (data) return data;
    if (hora) return hora;
    return '';
}  
        function formatarMoeda(valor) {
            return 'R$ ' + valor.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        function getPeriodo(mesRef) {
            if (mesRef === 'todos') return null;
            var partes = mesRef.split('-');
            var ano = parseInt(partes[0]);
            var mes = parseInt(partes[1]);
            return { inicio: new Date(ano, mes - 2, 21), fim: new Date(ano, mes - 1, 20) };
        }
        
        function abrirModalRegional(regional) {

            Array.from(regionais).sort().forEach(function(r) { var o = document.createElement('option'); o.value = r; o.textContent = r; selReg.appendChild(o); });
            var selLoja = document.getElementById('filtro-loja');
            Array.from(lojas).sort().forEach(function(l) { var o = document.createElement('option'); o.value = l; o.textContent = l; selLoja.appendChild(o); });
        }
        
        function abrirAba(nome) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('ativo'); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('ativo'); });
            event.target.classList.add('ativo');
            document.getElementById('aba-' + nome).classList.add('ativo');
        }
        
        document.addEventListener('DOMContentLoaded', function() { popularDropdowns(); aplicarFiltros(); });
    </script>
</body>
</html>
